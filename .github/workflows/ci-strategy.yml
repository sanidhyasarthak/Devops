name: Strategy Validation

on:
  workflow_call:

jobs:
  strategy-matrix:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        strategy: [mean_reversion, momentum, arbitrage]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (uv)
        run: |
          pip install uv
          uv sync

      - name: Run backtest
        run: |
          python backtests/run.py --strategy ${{ matrix.strategy }}

      - name: Walk-forward validation
        run: |
          python backtests/walk_forward.py --strategy ${{ matrix.strategy }}

      - name: Monte Carlo simulation
        run: |
          python backtests/monte_carlo.py --strategy ${{ matrix.strategy }}

      - name: Performance regression check
        run: |
          python scripts/compare_metrics.py \
            --strategy ${{ matrix.strategy }} \
            --baseline config/baseline.json
