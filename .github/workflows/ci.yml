name: CI - Test & Lint

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pylint

    - name: Lint with flake8
      run: |
        echo "Running flake8 linting..."
        
        # Strict check: Stop build on syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
        # Main linting with F824 ignored temporarily (global WIN issue)
        # Remove --ignore=F824 after fixing 'global WIN' in flappy_bird.py
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 \
                 --ignore=F824 --statistics

    - name: Lint with pylint (optional)
      run: |
        pylint --disable=all --enable=error flappy_bird.py visualize.py || echo "Pylint issues found (non-blocking)"

    - name: Run basic smoke test (import check)
      run: |
        python -c "import pygame; import neat; print('✅ Core dependencies imported successfully')"
        python -c "
        try:
            import flappy_bird
            print('✅ flappy_bird module imported successfully')
        except Exception as e:
            print(f'⚠️  Note: flappy_bird import failed - {e}')
        "

    - name: Verify pygame can initialize (headless check)
      run: |
        python -c "
        import os
        os.environ['SDL_VIDEODRIVER'] = 'dummy'
        import pygame
        pygame.init()
        print('✅ Pygame initialized in headless mode')
        pygame.quit()
        "
