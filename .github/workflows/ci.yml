name: CI - Test & Lint

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pylint

    - name: Lint with flake8
      run: |
        echo "🔍 Running syntax check..."
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        
        echo "🔍 Running main linting..."
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 \
                 --ignore=F824 --statistics

    - name: Smoke tests
      run: |
        echo "✅ Testing core dependencies..."
        python -c "import pygame, neat; print('✅ pygame and neat imported successfully')"
        
        echo "✅ Testing headless pygame..."
        python -c "
        import os
        os.environ['SDL_VIDEODRIVER'] = 'dummy'
        import pygame
        pygame.init()
        print('✅ Pygame initialized in headless mode')
        pygame.quit()
        "

    - name: Project import test
      run: |
        python -c "
        try:
            import flappy_bird
            print('✅ flappy_bird module imported successfully')
        except Exception as e:
            print(f'⚠️ Import note: {e}')
        "

    # ==================== DISCORD NOTIFICATIONS (Reliable curl method) ====================
    - name: Notify Discord on Success
      if: success()
      run: |
        curl -H "Content-Type: application/json" \
             -X POST \
             -d "{\"content\": \"✅ **CI Build Passed** - NEAT Flappy Bird\n📁 Repository: ${{ github.repository }}\n🌿 Branch: ${{ github.ref_name }}\n🔗 Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n🎉 All linting and tests passed successfully!\"}" \
             ${{ secrets.DISCORD_WEBHOOK_URL }}

    - name: Notify Discord on Failure
      if: failure()
      run: |
        curl -H "Content-Type: application/json" \
             -X POST \
             -d "{\"content\": \"❌ **CI Build Failed** - NEAT Flappy Bird\n📁 Repository: ${{ github.repository }}\n🌿 Branch: ${{ github.ref_name }}\n🔗 Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\n💡 Tip: Fix \\\"global WIN\\\" in flappy_bird.py (line ~315)\"}" \
             ${{ secrets.DISCORD_WEBHOOK_URL }}
