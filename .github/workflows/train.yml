name: Train NEAT Flappy Bird (Manual)

on:
  workflow_dispatch:   # Allows manual trigger from GitHub UI
    inputs:
      generations:
        description: 'Max generations to run'
        required: false
        default: '50'
        type: string

jobs:
  train:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # Install xvfb for virtual display (pygame needs it)
        sudo apt-get update && sudo apt-get install -y xvfb

    - name: Run training with virtual display
      run: |
        xvfb-run -a python flappy_bird.py --generations ${{ inputs.generations || 50 }} || echo "Training completed or stopped"
      env:
        DISPLAY: ':99'   # Optional, depending on your script

    - name: Upload best genome (if saved)
      uses: actions/upload-artifact@v4
      with:
        name: best-genome
        path: best.pickle
        if-no-files-found: warn
