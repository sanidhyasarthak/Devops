name: CI - Pull Request

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "core/**"
      - "strategies/**"
      - "tests/**"
      - "backtests/**"
      - "config/**"
      - ".github/workflows/**"

permissions:
  contents: read
  pull-requests: write
  checks: write

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type-test:
    uses: ./.github/workflows/reusable-python-ci.yml
    with:
      run_backtests: false

  strategy-validation:
    needs: lint-type-test
    uses: ./.github/workflows/ci-strategy.yml
