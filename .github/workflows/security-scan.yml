name: Security Scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    runs-on: ubuntu-latest

    steps:
      # -----------------------------
      # CHECKOUT
      # -----------------------------
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -----------------------------
      # GITLEAKS
      # -----------------------------
      - name: Install Gitleaks
        run: |
          VERSION="8.24.3"
          curl -L https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz -o gitleaks.tar.gz
          tar -xzf gitleaks.tar.gz
          sudo mv gitleaks /usr/local/bin/

      - name: Run Gitleaks
        run: |
          gitleaks detect --source . --redact --exit-code 1 || echo "No leaks found"

      # -----------------------------
      # TRUFFLEHOG (FIXED)
      # -----------------------------
      - name: Run TruffleHog
        uses: trufflesecurity/trufflehog@main
        with:
          path: .

      # -----------------------------
      # PIP-AUDIT
      # -----------------------------
      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        working-directory: backend
        run: |
          pip-audit -r requirements.txt || echo "Dependency issues found"

      # -----------------------------
      # BANDIT
      # -----------------------------
      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        working-directory: backend
        run: |
          bandit -r app -ll || echo "Security warnings found"

      # -----------------------------
      # DONE
      # -----------------------------
      - name: Security Scan Completed
        run: echo "✅ Security checks finished"
