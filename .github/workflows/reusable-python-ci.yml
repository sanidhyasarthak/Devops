name: Reusable Python CI

on:
  workflow_call:

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      # -----------------------------
      # LINT
      # -----------------------------
      - name: Install lint tools
        run: pip install ruff pylint

      - name: Run lint
        run: |
          ruff check .
          pylint app || true

      # -----------------------------
      # TYPE CHECK
      # -----------------------------
      - name: Install mypy
        run: pip install mypy

      - name: Run mypy
        run: mypy app || true

      # -----------------------------
      # TESTS
      # -----------------------------
      - name: Install pytest
        run: pip install pytest pytest-cov

      - name: Run tests
        run: pytest || echo "No tests yet"

      # -----------------------------
      # BASIC APP CHECK
      # -----------------------------
      - name: Validate app import
        run: python -c "import app"
